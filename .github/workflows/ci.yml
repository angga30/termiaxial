name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        override: true
        components: rustfmt, clippy
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: termiaxial/package-lock.json
    
    - name: Install dependencies
      working-directory: termiaxial
      run: npm ci
    
    - name: Rust format check
      working-directory: termiaxial/src-tauri
      run: cargo fmt -- --check
    
    - name: Rust clippy
      working-directory: termiaxial/src-tauri
      run: cargo clippy -- -D warnings
    
    - name: Rust tests
      working-directory: termiaxial/src-tauri
      run: cargo test
    
    - name: TypeScript lint
      working-directory: termiaxial
      run: npm run lint || echo "Lint not configured yet"
