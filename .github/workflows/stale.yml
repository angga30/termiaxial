name: Stale Issues and PRs

on:
  schedule:
    # Run daily at 5 AM UTC
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Mark stale issues and PRs
        uses: actions/stale@v9
        with:
          stale-issue-message: |
            This issue has been inactive for 30 days. Is this still relevant?
            - Please update with the latest information
            - Let us know if you'd like to work on this
            - Close this if it's no longer needed

            Thank you for your contribution!
          stale-pr-message: |
            This pull request has been inactive for 30 days. Is this still relevant?
            - Please update with the latest changes
            - Address any review comments
            - Close this if it's no longer needed

            Thank you for your contribution!
          days-before-stale: 30
          days-before-close: 14
          stale-issue-label: 'stale'
          close-issue-label: 'wontfix'
          stale-pr-label: 'stale'
          close-pr-label: 'abandoned'
          exempt-issue-labels: 'good first issue,help wanted,security,priority'
          exempt-pr-labels: 'work in progress,security,priority'
          exempt-draft-pr: true